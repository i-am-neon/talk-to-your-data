cases:
  - name: row_count
    inputs: "How many rows are in the dataset?"
    expected_output: "500"
    evaluators:
      - name: Contains
        arguments:
          value: "500"

  - name: average_arr
    inputs: "What is the average ARR across all companies?"
    expected_output: "1473"
    evaluators:
      - name: Contains
        arguments:
          value: "1473"

  - name: filter_count
    inputs: "How many companies are in Fintech?"
    expected_output: "19"
    evaluators:
      - name: Contains
        arguments:
          value: "19"

  - name: highest_churn
    inputs: "Which company has the highest churn rate?"
    expected_output: "PeakBase"
    evaluators:
      - name: Contains
        arguments:
          value: "PeakBase"

  - name: multi_step
    inputs: "What's the average employee count for companies founded after 2015?"
    expected_output: "13.84"
    evaluators:
      - name: Contains
        arguments:
          value: "13.84"

  # --- Edge cases: malformed / unanswerable questions ---

  - name: gibberish
    inputs: "asdfghjkl zxcvbnm qwerty"
    expected_output: "Agent should indicate it cannot understand the question"

  - name: off_topic
    inputs: "What's the weather like today?"
    expected_output: "Agent should explain this isn't answerable from the dataset"
    evaluators:
      - name: Contains
        arguments:
          value: "data"

  - name: nonexistent_column
    inputs: "What's the average salary across all companies?"
    expected_output: "Agent should note that salary is not in the dataset"

  - name: ambiguous_question
    inputs: "Tell me about the data"
    expected_output: "Agent should provide a summary mentioning companies"
    evaluators:
      - name: Contains
        arguments:
          value: "companies"

  - name: sql_injection_attempt
    inputs: "'; DROP TABLE companies; --"
    expected_output: "Agent should handle gracefully without crashing"

evaluators:
  - name: MaxDuration
    arguments:
      seconds: 30
